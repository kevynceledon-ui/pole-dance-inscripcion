<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pole Dance - Panel Profesor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Panel Profesor</h1>
            <p>Gestión de Clases e Inscripciones</p>
        </header>

        <main>
            <section id="login-section" class="section">
                <h2>Iniciar Sesión</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="Tu email">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Tu contraseña">
                    </div>
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                </form>
                <p id="login-error" class="error-message hidden"></p>
            </section>

            <section id="dashboard-section" class="section hidden">
                <div class="header-dashboard">
                    <h2>Mis Semanas</h2>
                    <button id="logout-btn" class="btn btn-secondary btn-small">Cerrar Sesión</button>
                </div>

                <div class="semana-navigator">
                    <button id="semana-anterior" class="btn btn-nav">← Anterior</button>
                    <span id="semana-actual">Semana actual</span>
                    <button id="semana-siguiente" class="btn btn-nav">Siguiente →</button>
                </div>

                <div class="semana-actions">
                    <button id="crear-semana-btn" class="btn btn-primary">+ Nueva Semana</button>
                    <button id="copiar-semana-btn" class="btn btn-secondary">Copiar de semana anterior</button>
                </div>

                <div id="gestion-clases" class="section subsection">
                    <h3>Clases de esta semana</h3>
                    <div id="dias-disponibles" class="dias-grid">
                        <div class="dia-card" data-dia="1">
                            <span class="dia-nombre">Lunes</span>
                            <button class="btn-agregar-clase btn btn-small">+ Agregar</button>
                        </div>
                        <div class="dia-card" data-dia="2">
                            <span class="dia-nombre">Martes</span>
                            <button class="btn-agregar-clase btn btn-small">+ Agregar</button>
                        </div>
                        <div class="dia-card" data-dia="3">
                            <span class="dia-nombre">Miércoles</span>
                            <button class="btn-agregar-clase btn btn-small">+ Agregar</button>
                        </div>
                        <div class="dia-card" data-dia="4">
                            <span class="dia-nombre">Jueves</span>
                            <button class="btn-agregar-clase btn btn-small">+ Agregar</button>
                        </div>
                        <div class="dia-card" data-dia="5">
                            <span class="dia-nombre">Viernes</span>
                            <button class="btn-agregar-clase btn btn-small">+ Agregar</button>
                        </div>
                        <div class="dia-card" data-dia="6">
                            <span class="dia-nombre">Sábado</span>
                            <button class="btn-agregar-clase btn btn-small">+ Agregar</button>
                        </div>
                        <div class="dia-card" data-dia="0">
                            <span class="dia-nombre">Domingo</span>
                            <button class="btn-agregar-clase btn btn-small">+ Agregar</button>
                        </div>
                    </div>
                </div>

                <div id="inscripciones-section" class="section subsection">
                    <h3>Inscripciones</h3>
                    <div id="lista-inscripciones">
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <a href="index.html">Volver a inscripción alumna</a>
        </footer>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
